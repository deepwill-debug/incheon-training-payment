<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>결제 실패</title>
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            text-align: center;
            padding: 50px;
        }

        h1 {
            color: #dc3545;
        }

        .message {
            font-size: 18px;
            margin-bottom: 30px;
        }

        .btn {
            background-color: #6c757d;
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 5px;
        }

        .footer {
            margin-top: 50px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            font-size: 13px;
            color: #777;
            text-align: center;
        }
    </style>
</head>

<body>
    <h1>결제에 실패했습니다</h1>
    <p class="message">
        {{ message }}<br>
        (코드: {{ code }})
    </p>
    <a href="/" class="btn">다시 시도하기</a>

    <footer class="footer">
        <p>인천상공회의소 (Tel: 032-810-2800)</p>
    </footer>
</body>

</html>
